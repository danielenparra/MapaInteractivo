<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/Estaciones_Troncales_de_TRANSMILENIO_2.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[4.5676600058536305,-74.25751684342627],[4.816619395371424,-73.87612015309195]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OSMStandard_0');
        map.getPane('pane_OSMStandard_0').style.zIndex = 400;
        var layer_OSMStandard_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OSMStandard_0',
            opacity: 1.0,
            attribution: '<a href="https://www.openstreetmap.org/copyright">© OpenStreetMap contributors, CC-BY-SA</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OSMStandard_0;
        map.addLayer(layer_OSMStandard_0);
        map.createPane('pane_MapaGris_1');
        map.getPane('pane_MapaGris_1').style.zIndex = 401;
        var layer_MapaGris_1 = L.tileLayer('https://tiles.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
            pane: 'pane_MapaGris_1',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_MapaGris_1;
        map.addLayer(layer_MapaGris_1);
        function pop_Estaciones_Troncales_de_TRANSMILENIO_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Estación Transmilenio</th>\
                        <td class="visible-with-data" id="nom_est">' + (feature.properties['nom_est'] !== null ? autolinker.link(String(feature.properties['nom_est']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Numero de Vagones</th>\
                        <td class="visible-with-data" id="num_vag">' + (feature.properties['num_vag'] !== null ? autolinker.link(String(feature.properties['num_vag']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Capacidad Transmilenio</th>\
                        <td class="visible-with-data" id="cap_art">' + (feature.properties['cap_art'] !== null ? autolinker.link(String(feature.properties['cap_art']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Tipo Estación</th>\
                        <td class="visible-with-data" id="tipo_esta">' + (feature.properties['tipo_esta'] !== null ? autolinker.link(String(feature.properties['tipo_esta']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Ubicación</th>\
                        <td class="visible-with-data" id="ub_est">' + (feature.properties['ub_est'] !== null ? autolinker.link(String(feature.properties['ub_est']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Estaciones_Troncales_de_TRANSMILENIO_2_0() {
            return {
                pane: 'pane_Estaciones_Troncales_de_TRANSMILENIO_2',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(193,12,19,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_Estaciones_Troncales_de_TRANSMILENIO_2');
        map.getPane('pane_Estaciones_Troncales_de_TRANSMILENIO_2').style.zIndex = 402;
        map.getPane('pane_Estaciones_Troncales_de_TRANSMILENIO_2').style['mix-blend-mode'] = 'normal';
        var layer_Estaciones_Troncales_de_TRANSMILENIO_2 = new L.geoJson(json_Estaciones_Troncales_de_TRANSMILENIO_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Estaciones_Troncales_de_TRANSMILENIO_2',
            layerName: 'layer_Estaciones_Troncales_de_TRANSMILENIO_2',
            pane: 'pane_Estaciones_Troncales_de_TRANSMILENIO_2',
            onEachFeature: pop_Estaciones_Troncales_de_TRANSMILENIO_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_Estaciones_Troncales_de_TRANSMILENIO_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_Estaciones_Troncales_de_TRANSMILENIO_2);
        map.addLayer(layer_Estaciones_Troncales_de_TRANSMILENIO_2);
        setBounds();
        var i = 0;
        layer_Estaciones_Troncales_de_TRANSMILENIO_2.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['nom_est'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['nom_est']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_Estaciones_Troncales_de_TRANSMILENIO_2'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_Estaciones_Troncales_de_TRANSMILENIO_2]);
        map.on("zoomend", function(){
            resetLabels([layer_Estaciones_Troncales_de_TRANSMILENIO_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Estaciones_Troncales_de_TRANSMILENIO_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Estaciones_Troncales_de_TRANSMILENIO_2]);
        });
        </script>        
    </body>
</html>
